<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Links website</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/feather-icons"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #0d1117;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(56, 89, 153, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(30, 60, 110, 0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(15, 25, 50, 0.4) 0%, transparent 80%);
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  /* Profile */
  .profile {
    text-align: center;
    margin-bottom: 40px;
  }

  .profile img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid #2a3a5c;
    margin-bottom: 16px;
    box-shadow: 0 0 24px rgba(56, 89, 153, 0.25);
  }

  .profile h1 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.5px;
  }

  .profile p {
    font-size: 0.85rem;
    color: #888;
    margin-top: 6px;
  }

  /* Sections */
  .section {
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 12px;
    text-align: center;
  }

  .links-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .links-container a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 13px 20px;
    background-color: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(6px);
    color: #e0e0e0;
    text-decoration: none;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    transition: background-color 0.2s, border-color 0.2s, color 0.2s;
  }

  .links-container a i {
    font-size: 1rem;
    width: 18px;
    text-align: center;
  }

  .links-container a:hover {
    background-color: rgba(56, 89, 153, 0.15);
    border-color: rgba(56, 89, 153, 0.4);
    color: #ffffff;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 0.75rem;
    color: #444;
  }
</style>
</head>
<body>
  <div class="container">

    <!-- Perfil -->
    <div class="profile">
      <img src="https://avatars.githubusercontent.com/u/51790572?v=4" alt="Profile picture">
      <h1 id="name">Hola, no funcionas</h1>
      <p>¡Mira mis enlaces!</p>
    </div>

    <!-- Redes sociales -->
    <div class="section">
      <p class="section-title">Mis redes sociales</p>
      <div class="links-container">
        <a id="facebookLink" href="#" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <a id="instagramUser" href="#" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
        <a id="xUser" href="#" target="_blank"><i class="fa-brands fa-x-twitter"></i> X</a>
        <a id="githubUser" href="#" target="_blank"><i class="fa-brands fa-github"></i> Github</a>
      </div>
    </div>

    <!-- Experiencia -->
    <div class="section">
      <p class="section-title">Mi experiencia</p>
      <div class="links-container">
        <a id="linkedinUser" href="#" target="_blank"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
      </div>
    </div>

    <!-- Blog -->
    <div class="section">
      <p class="section-title">Mi blog</p>
      <div class="links-container">
        <a id="website" href="#" target="_blank"><i class="fa-brands fa-github"></i> Amin Espinoza</a>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      &copy; 2023 &mdash; <span id="author">Hecho por Miranda Espinoza</span>
    </div>

  </div>
  <script>
    feather.replace()
  </script>
  <script type="text/javascript" src="requests.js"></script>
</body>
</html>
